[project]
name = "storyweave"
version = "0.1.0"
description = "Educational project for AI-powered person relationship analysis for books and narratives. Extract entities, map connections, and explore the social graph of any story."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "ebooklib>=0.20",
    "en-core-web-sm",
    "en-core-web-trf",
    "fastapi[standard]>=0.135.1",
    "openai>=1.0.0",
    "psycopg2-binary>=2.9.11",
    "pypdf>=6.7.1",
    "python-dotenv>=1.2.2",
    "spacy>=3.8.11",
    "sqlalchemy>=2.0.48",
    "transformers>=4.57.0",
]

[tool.uv.sources]
en-core-web-sm = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl" }
en-core-web-trf = { url = "https://github.com/explosion/spacy-models/releases/download/en_core_web_trf-3.8.0/en_core_web_trf-3.8.0-py3-none-any.whl" }
