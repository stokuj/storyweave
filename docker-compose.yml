services:
  storyweave-api:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    image: storyweave-api:local
    container_name: storyweave-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data: