services:
  storyweave-api:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    image: storyweave-api:local
    container_name: storyweave-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    image: storyweave-api:local
    container_name: storyweave-celery-worker
    command: ["uv", "run", "celery", "-A", "api.app.celery", "worker", "--loglevel=warning"]
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: